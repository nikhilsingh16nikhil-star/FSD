<body  text="white">

        <table bgcolor="maroon" width="100%" cellspacing="10px">

            <label>First Name</label>
        </th>
       <td>

          </tr>
          <tr>
            <th>

            <td>

          </tr>

          <tr>

          </tr>
          <tr>

            <th>

            <th>

            </td>

         <tr>

            <th>

            </th>

                 <input type="checkbox" value="graduation" name="chk3"/><label>graduation(Bachelors)</label><br>
                <input type="checkbox" value="master" name="chk4"/><label>Post graduation(Master)</label><br>
                <input type="checkbox" value="phd" name="chk5"/><label>phd</label>

    <lable>Courses Applied For</lable>

      <td>

        <br> <input type="checkbox"name="chek15"value="MCA(Master of Computer Applications)"/> <label>MCA(Master of Computer Applications)</label>

</td>
</tr>
